name: Deploy Static Site 🚀

on:
  push:
    branches:
      - main  # This triggers the pipeline whenever you push to the 'main' branch

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest # This is the temporary VM that runs your tasks
    steps:
      - name: Checkout code 📥
        uses: actions/checkout@v4

      - name: Setup Pages 🛠️
        uses: actions/configure-pages@v4

        - name: Check for index.html 🔍
        run: |
          if [ ! -f index.html ]; then
            echo "Error: index.html not found!"
            exit 1
          fi

      - name: Check content 📝
        run: grep -q "Static" index.html

      - name: Upload artifact 📤
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # This tells GitHub to take everything in the root folder

      - name: Deploy to GitHub Pages 🌐
        id: deployment
        uses: actions/deploy-pages@v4
